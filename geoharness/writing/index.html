<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geoharness — Writing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      font-size: 14px;
      line-height: 1.6;
      color: #000;
      background: #fff;
      padding: 3rem 2rem;
      max-width: 600px;
    }

    nav {
      position: fixed;
      top: 2rem;
      left: 2rem;
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      font-family: monospace;
      font-size: 14px;
      color: #000;
      text-decoration: none;
      border: 1px solid #000;
      padding: 0.15rem 0.5rem;
    }

    .btn:hover {
      background: #000;
      color: #fff;
    }

    main {
      padding-top: 3rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="https://ryanperkins.dev" class="btn">Home</a>
    <a href="https://ryanperkins.dev#projects" class="btn">Projects</a>
    <a href="https://ryanperkins.dev/cv.pdf" class="btn" target="_blank" rel="noopener noreferrer">CV</a>
  </nav>

  <main>
    <p>coming soon</p>
  </main>
</body>
</html>
